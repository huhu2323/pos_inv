name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build desktop installer
        run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p installers
          shopt -s nullglob
          if [ "${{ matrix.platform }}" = "mac" ]; then
            cp release/*.dmg installers/
          else
            cp release/*.exe installers/
          fi
          if [ -z "$(ls -A installers)" ]; then
            echo "No installer found in release/"
            ls -la release/
            exit 1
          fi
          ls -la installers/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installer
          path: installers/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes
        run: node scripts/extract-changelog-notes.mjs "${GITHUB_REF_NAME#v}" > release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          mapfile -t files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found in artifacts/"
            exit 1
          fi

          echo "Uploading ${#files[@]} file(s) for ${tag}:"
          printf '  - %s\n' "${files[@]}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --notes-file release-notes.md --title "Tofu POS ${tag#v}"
          fi
